apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-secrets
  namespace: argocd
  annotations:
    # After ESO (wave 1): the SecretStore/ExternalSecret CRDs must exist first.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: eks-project
  source:
    repoURL: https://github.com/talhaimtiaz09/argocd-gitops-config.git
    targetRevision: main
    path: eks/secrets        # AWS Secrets Manager SecretStore + ExternalSecret
  destination:
    server: https://kubernetes.default.svc
    namespace: web           # materialize web-db-credentials in the app namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
