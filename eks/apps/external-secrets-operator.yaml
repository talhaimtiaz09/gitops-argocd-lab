apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eks-external-secrets
  namespace: argocd
  annotations:
    # Install ESO (CRDs + controller) before anything that uses its CRDs.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: eks-project
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.4          # PINNED ESO chart -> ESO v0.10.4 (never 'latest')
    helm:
      parameters:
        - name: installCRDs
          value: "true"
        # IRSA: bind ESO's ServiceAccount to an IAM role so it reads AWS Secrets
        # Manager with NO static keys. Supply the role ARN from your Terraform
        # output (see eks/README.md → "Values you must set").
        - name: serviceAccount.annotations.eks\.amazonaws\.com/role-arn
          value: REPLACE_ME_ESO_IRSA_ROLE_ARN
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # ESO CRDs are large; avoids the last-applied annotation size limit
