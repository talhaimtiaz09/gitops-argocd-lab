# ESO SecretStore (namespaced, in `web`) pointing at AWS Secrets Manager.
# This is the EKS counterpart of the kind lab's Vault SecretStore — the ExternalSecret
# on the other side is identical; only this provider block differs.
#
# Auth is via IRSA: `auth: {}` (empty) makes ESO use the IAM role bound to its
# controller ServiceAccount (annotated in eks/apps/external-secrets-operator.yaml).
# No static AWS keys live in the cluster.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  provider:
    aws:
      service: SecretsManager
      region: REPLACE_ME_AWS_REGION    # e.g. us-east-1 (see eks/README.md)
      auth: {}                         # IRSA-bound ServiceAccount — no static keys
