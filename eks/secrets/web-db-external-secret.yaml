# Git holds only this REFERENCE. ESO pulls the real username/password from AWS
# Secrets Manager at runtime and writes them into a normal K8s Secret
# `web-db-credentials`. No secret value appears anywhere in this repo.
#
# Store the source secret in Secrets Manager as JSON, e.g.:
#   { "username": "webuser", "password": "<set-in-aws>" }
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web-db-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h          # ESO re-pulls hourly; tighten/loosen per rotation needs
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: web-db-credentials   # the K8s Secret ESO creates/owns in `web`
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: REPLACE_ME_SECRET_NAME   # SM secret name, e.g. eks-paved-road/dev/web-db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: REPLACE_ME_SECRET_NAME
        property: password
