# Git holds only this REFERENCE. ESO pulls the real username/password from Vault
# at runtime and writes them into a normal K8s Secret named `web-db-credentials`.
# No password value appears anywhere in this repo — only the Vault path/keys.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: web-db-credentials
  annotations:
    argocd.argoproj.io/sync-wave: "2"   # after the SecretStore (wave 1)
spec:
  # Rotation demo (RUN2 step 8): ESO re-pulls every 15s. Mounted-file consumers
  # update in place; env-var consumers (our web app) need a pod restart to pick up
  # the new value. Bump this to minutes/hours for anything real.
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: web-db-credentials    # the K8s Secret ESO creates/owns in `dev`
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: web-db-credentials # Vault path: secret/web-db-credentials
        property: username
    - secretKey: password
      remoteRef:
        key: web-db-credentials
        property: password
