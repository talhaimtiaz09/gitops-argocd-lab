# SecretStore vs ClusterSecretStore — we use a NAMESPACED SecretStore (in `dev`).
# A ClusterSecretStore would expose this Vault backend to EVERY namespace; we only
# need `dev`, so the namespaced SecretStore is the least-privilege choice and lives
# right next to the ExternalSecret that uses it.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after the Vault pod (wave 0)
spec:
  provider:
    vault:
      server: "http://vault.dev.svc:8200"
      path: "secret"          # KV v2 mount (Vault dev mode mounts KV v2 at secret/)
      version: "v2"
      auth:
        # ESO authenticates to Vault with a token kept in a K8s Secret.
        # That Secret is created OUT OF BAND (see platform/README.md) so the token
        # value is NEVER committed to Git:
        #   kubectl -n dev create secret generic vault-token --from-literal=token=root
        tokenSecretRef:
          name: "vault-token"
          key: "token"
      # --- EKS TODO (swap backend Vault -> AWS Secrets Manager) ----------------
      # On EKS, DELETE the `vault:` block above and swap in the AWS provider. The
      # ExternalSecret on the other side does NOT change — only this provider does:
      #
      #   provider:
      #     aws:
      #       service: SecretsManager
      #       region: us-east-1
      #       auth: {}       # empty -> use the IRSA-bound ServiceAccount (no static keys)
      #
      # The IRSA role-arn annotation goes on ESO's ServiceAccount — set it in
      # apps/external-secrets.yaml (serviceAccount.annotations).
      # ------------------------------------------------------------------------
