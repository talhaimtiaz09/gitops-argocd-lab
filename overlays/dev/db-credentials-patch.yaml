# dev-only: consume the ESO-synced Secret. staging (chart/) and prod (overlays/prod)
# are untouched, so prod's manual-sync gate and config stay exactly as they were.
#
# envFrom replaces the whole list (no strategic merge key), so we re-list the base
# configMapRef alongside the new secretRef to keep both. The Secret's keys
# (username, password) become env vars of the same name in the container.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  template:
    spec:
      containers:
        - name: web
          envFrom:
            - configMapRef:
                name: web-config          # from base — keep it
            - secretRef:
                name: web-db-credentials   # created by ESO from Vault
