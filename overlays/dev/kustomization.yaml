apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
resources:
  - ../../base
  - presync-migration.yaml
  - postsync-smoketest.yaml
patches:
  - path: replica-patch.yaml
  - path: db-credentials-patch.yaml
configMapGenerator:
  - name: web-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
      - SECRET_BACKEND=vault-dev
generatorOptions:
  disableNameSuffixHash: true
