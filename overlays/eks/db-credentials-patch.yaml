# Consume the ESO-synced Secret (sourced from AWS Secrets Manager via IRSA).
# Identical shape to overlays/dev — only the backend behind web-db-credentials differs.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
spec:
  template:
    spec:
      containers:
        - name: web
          envFrom:
            - configMapRef:
                name: web-config          # from base — keep it
            - secretRef:
                name: web-db-credentials   # created by ESO from AWS Secrets Manager
