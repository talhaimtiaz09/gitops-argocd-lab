apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo-project
  source:
    repoURL: https://github.com/talhaimtiaz09/argocd-gitops-config.git
    targetRevision: main
    path: apps
    directory:
      recurse: false
      include: '{dev.yaml,staging.yaml,prod.yaml,external-secrets.yaml,secrets-backend.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
