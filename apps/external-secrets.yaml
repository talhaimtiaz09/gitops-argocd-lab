apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
  annotations:
    # Install ESO (CRDs + controller) BEFORE anything that uses its CRDs.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform-project
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: 0.10.4          # PINNED ESO chart -> ESO v0.10.4 (never 'latest')
    helm:
      parameters:
        - name: installCRDs
          value: "true"
        # --- EKS TODO (IRSA) -------------------------------------------------
        # On EKS, ESO authenticates to AWS Secrets Manager via IRSA — an IAM role
        # bound to ESO's ServiceAccount — so there are NO static AWS keys.
        # The role-arn annotation goes on ESO's ServiceAccount, set right here:
        #   - name: serviceAccount.annotations.eks\.amazonaws\.com/role-arn
        #     value: arn:aws:iam::<ACCOUNT_ID>:role/eso-secrets-reader
        # (Local/kind has no IRSA — ESO uses the Vault token instead; see
        #  platform/secretstore.yaml.)
        # ---------------------------------------------------------------------
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true   # ESO CRDs are large; avoids the last-applied annotation size limit
