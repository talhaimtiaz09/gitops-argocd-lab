apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: secrets-backend
  namespace: argocd
  annotations:
    # After external-secrets (wave 1): the SecretStore/ExternalSecret CRDs this app
    # creates only exist once ESO is installed.
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: demo-project
  source:
    repoURL: https://github.com/talhaimtiaz09/gitops-argocd-lab.git
    targetRevision: main
    path: platform        # Vault dev pod + SecretStore + ExternalSecret (Kustomize)
  destination:
    server: https://kubernetes.default.svc
    namespace: dev        # materialize web-db-credentials in the same ns as the web app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
